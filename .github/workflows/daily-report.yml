name: Daily US Market Report

on:
  schedule:
    # 06:30 KST = 21:30 UTC (전날)
    # 미국 동부 EST 마감(16:00) → 약 10시간 후 수집
    - cron: '30 21 * * 1-5'   # 월~금 (주말 미장 없음)
  workflow_dispatch:            # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache sector data
        uses: actions/cache@v4
        with:
          path: data/sector_cache.json
          key: sector-cache-v1   # 섹터는 잘 안 바뀌므로 고정 키

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector & reporter
        run: python run_report.py

      - name: Commit & push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet || git commit -m "📊 US Market Report $(date +'%Y-%m-%d')"
          git push
